{% extends 'base.html' %}

{% block title %}Login - E-Governance Portal{% endblock %}

{% block content %}

<div style="max-width: 500px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

    <h2 style="text-align: center; color: #1a3c6e; margin-bottom: 25px;">
        🔐 Login to Portal
    </h2>

    <form method="POST" action="/login">

        <!-- Email -->
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom: 6px; font-weight: bold;">
                📧 Email Address
            </label>
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
        </div>

        <!-- Password -->
        <div style="margin-bottom: 25px;">
            <label style="display:block; margin-bottom: 6px; font-weight: bold;">
                🔒 Password
            </label>
            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" style="width:100%; font-size:16px; padding:12px;">
            🔐 Login Now
        </button>

    </form>

    <p style="text-align:center; margin-top:20px; color:#555;">
        Don't have an account?
        <a href="/register" style="color:#1a3c6e; font-weight:bold;">Register here</a>
    </p>

</div>

{% endblock %}
