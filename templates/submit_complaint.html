{% extends 'base.html' %}

{% block title %}Submit Complaint - E-Governance Portal{% endblock %}

{% block content %}

<div style="max-width: 650px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

    <h2 style="text-align: center; color: #1a3c6e; margin-bottom: 25px;">
        📝 Submit a Complaint
    </h2>

    <form method="POST" action="/submit-complaint">

        <!-- Complaint Title -->
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom: 6px; font-weight: bold;">
                📌 Complaint Title
            </label>
            <input
                type="text"
                name="title"
                placeholder="Enter a short title for your complaint"
                required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
        </div>

        <!-- Category -->
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom: 6px; font-weight: bold;">
                🏷️ Category
            </label>
            <select
                name="category"
                required
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
                <option value="">-- Select Category --</option>
                <option value="Road & Infrastructure">🛣️ Road & Infrastructure</option>
                <option value="Water Supply">💧 Water Supply</option>
                <option value="Electricity">⚡ Electricity</option>
                <option value="Sanitation">🗑️ Sanitation</option>
                <option value="Public Safety">🚔 Public Safety</option>
                <option value="Healthcare">🏥 Healthcare</option>
                <option value="Education">🎓 Education</option>
                <option value="Other">📋 Other</option>
            </select>
        </div>

        <!-- Description -->
        <div style="margin-bottom: 25px;">
            <label style="display:block; margin-bottom: 6px; font-weight: bold;">
                📄 Description
            </label>
            <textarea
                name="description"
                placeholder="Describe your complaint in detail..."
                required
                rows="5"
                style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:15px; resize:vertical;"></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" style="width:100%; font-size:16px; padding:12px;">
            📤 Submit Complaint
        </button>

    </form>

    <p style="text-align:center; margin-top:20px; color:#555;">
        Want to go back?
        <a href="/dashboard" style="color:#1a3c6e; font-weight:bold;">Back to Dashboard</a>
    </p>

</div>

{% endblock %}
